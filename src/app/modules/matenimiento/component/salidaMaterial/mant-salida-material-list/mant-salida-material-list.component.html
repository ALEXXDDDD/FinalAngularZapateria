<div class="min-h-screen bg-gray-50 py-6 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto space-y-6">

    <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
      
      <div class="bg-slate-800 px-6 py-4 border-b border-gray-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <h2 class="text-md font-bold text-white uppercase tracking-wider flex items-center space-x-2">
          <i class="fas fa-history text-blue-400"></i>
          <span>Historial de Salida de Materiales</span>
        </h2>
        
        <button 
          type="button"
          (click)="crearSalidaMateria(modalEdit)" 
          class="inline-flex items-center space-x-1.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-4 py-2 rounded-lg shadow-sm transition-colors duration-150 self-start sm:self-auto"
          title="Registrar nueva salida">
          <i class="fas fa-plus text-xs"></i>
          <span>Nueva Salida</span>
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full min-w-full divide-y divide-gray-200">
          <thead class="bg-slate-100">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Código de Producción</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Material Sacado</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Estado</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Cantidad Extraída</th>
            </tr>
          </thead>
          
          <tbody class="bg-white divide-y divide-gray-200">
            <ng-container *ngFor="let d of salidaMaterial">
              <tr *ngFor="let e of d.salidaMaterials" class="hover:bg-slate-50/70 transition-colors duration-150">
                
                <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-slate-600 font-bold">
                  #{{ e.idProduccion }}
                </td>
                
                <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-slate-900">
                  {{ e.nombreMaterial }}
                </td>
                
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                  <span [class.bg-emerald-100]="e.estado === 'Completado' || e.estado === 'Activo'" 
                        [class.text-emerald-800]="e.estado === 'Completado' || e.estado === 'Activo'"
                        [class.bg-amber-100]="e.estado === 'Pendiente'" 
                        [class.text-amber-800]="e.estado === 'Pendiente'"
                        [class.bg-slate-100]="e.estado !== 'Completado' && e.estado !== 'Activo' && e.estado !== 'Pendiente'"
                        [class.text-slate-700]="e.estado !== 'Completado' && e.estado !== 'Activo' && e.estado !== 'Pendiente'"
                        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold uppercase tracking-wide">
                    {{ e.estado }}
                  </span>
                </td>
                
                <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-800">
                  {{ e.cantidad }} u.
                </td>

              </tr>
            </ng-container>

            <tr *ngIf="!salidaMaterial || salidaMaterial.length === 0">
              <td colspan="4" class="px-6 py-10 text-center text-sm text-slate-400 font-medium">
                <i class="fas fa-boxes text-2xl block mb-2 text-slate-300"></i>
                No se registran salidas de materiales en el historial.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<ng-template #modalEdit>
  <app-mant-salida-material-register
    [title]="title"
    [salidaMaterial]="selectSalidaMaterial"
    [accion]="accionModal"
    (closeModalEmmit)="getCloseModal($event)"
  >
  </app-mant-salida-material-register>
</ng-template>
