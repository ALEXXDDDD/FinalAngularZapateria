<app-welcome-header></app-welcome-header>
<div *ngIf="frmLoadSt === loadStateEnum.None" class="login-wrapper">
  <div class="login-card">
    
    <div class="login-header">
      <div class="img-container">
        <img src="./../../../assets/img/Img_Welcome/images.png" alt="Bienvenido" class="welcome-img">
      </div>
      <h2>¡Bienvenido!</h2>
      <p class="subtitle">Ingresa tus datos para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
      
      <div class="input-group">
        <input 
          formControlName="usuario" 
          type="text" 
          id="usuario" 
          placeholder=" " 
          required 
        />
        <label for="usuario">Usuario</label>
        <span class="focus-border"></span>
      </div>

      <div class="input-group">
        <input 
          formControlName="password" 
          type="password" 
          id="password" 
          placeholder=" " 
          required 
        />
        <label for="password">Contraseña</label>
        <span class="focus-border"></span>
      </div>

      <div class="form-options">
        <a href="javascript:void(0)" class="forgot-pass">¿Olvidaste tu contraseña?</a>
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid" 
        class="btn-submit">
        <span>Ingresar</span>
        <i class="fas fa-arrow-right icon-slide"></i>
      </button>

      <div class="divider">
        <span>O ingresa con</span>
      </div>

      <div id="buttonDiv" class="social-login-container"></div>

      <div class="register-footer">
        <span>¿No tienes una cuenta?</span>
        <a routerLink="register" class="link-register">Regístrate aquí</a>
      </div>

    </form>
  </div>
</div>

<div *ngIf="frmLoadSt === loadStateEnum.Loading || frmLoadSt === loadStateEnum.Error">
  <app-loading-widget [state]="frmLoadSt"></app-loading-widget>
</div>

<div *ngIf="frmLoadSt === loadStateEnum.Success">
  </div>
