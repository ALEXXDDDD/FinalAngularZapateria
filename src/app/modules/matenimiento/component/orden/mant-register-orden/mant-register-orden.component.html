<div class="modal-header bg-primary text-white">
    <h4 class="modal-title">{{title}}</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="cerrarModal(false)"></button>
</div>

<form [formGroup]="myForm" class="p-3">
    <div class="mb-3">
        <label for="clienteSelect" class="form-label">Seleccione el Cliente</label>
        <select id="clienteSelect" class="form-select" formControlName="nombreCliente">
            <option *ngFor="let clie of responseVwCliente[0]?.clientes" [value]="clie.nombreCliente">
                {{clie.nombreCliente}}
            </option>
        </select>
    </div>
    
    <div class="mb-3">
        <label for="estadoSelect" class="form-label">Estado</label>
        <select id="estadoSelect" [value]="orden.estadoOrden" class="form-select" formControlName="estadoOrden" >
            <option value="ACTIVO">ACTIVO</option>
            <option value="INACTIVO">INACTIVO</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="codigoOrden" class="form-label">Código de la Orden</label>
        <input type="text" id="codigoOrden" class="form-control" formControlName="codigoOrden">
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="fechaOrden" class="form-label">Fecha</label>
            <input type="date" id="fechaOrden" class="form-control" formControlName="fechaOrden"  [value]="orden.fechaOrden"> 
        </div>
        <div class="col-md-6 mb-3">
            <label for="fechaRequerido" class="form-label">Fecha Requerida</label>
            <input type="date" id="fechaRequerido" class="form-control" formControlName="fechaRequerido"  [value]="orden.fechaRequerido" >
        </div>
    </div>
    <div class="col-md-6 mb-3">
       
        <label for="unidadSelect" class="form-label mt-2">Unidad</label>
        <select id="unidadSelect" class="form-select" formControlName="nombreUnidad">
            <!--<option *ngFor="let listUnidad of responseUnidad" [value]="listUnidad.nombreUnidad">
                {{listUnidad.nombreUnidad}}
            </option>-->
            <option value="Pares" class="form-select"> 
                PARES
            </option>
        </select>
    </div>
    <div class="mb-3">
        <label for="productoSelect" class="form-label">Seleccione el Producto</label>
        <select id="productoSelect" class="form-select" formControlName="nombreProd">
            <option value="" disabled>Seleccione un producto</option>
            <option *ngFor="let listProducto of responseProducto" [value]="listProducto.nombreProd">
                {{listProducto.nombreProd}}
            </option>
        </select>
    </div>
    <div class="col-md-4">
        <div class="form-group">
            <label for="stock">Stock Disponible</label>
            <input type="number" class="form-control" id="stock" formControlName="stock" readonly>
        </div>
    </div>
    <div class="mb-3">
        <button type="button" class="btn btn-secondary" >
            <i class="fas fa-plus"></i> Agregar Más Producto
        </button>
    </div>
    <label for="cantidad" class="form-label">Cantidad Por Pares</label>
    <input type="number" id="cantidad" class="form-control" formControlName="cantidad" placeholder="Cantidad">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="precioUnitario" class="form-label">Precio por Par</label>
            <input type="number" id="precioUnitario" class="form-control" formControlName="precioUnitario" placeholder="Precio Unitario" readonly>
        </div>
        
    </div>

    <div class="mb-3">
        <label for="montoTotal" class="form-label">Monto Total</label>
        <input type="number" id="montoTotal" class="form-control" formControlName="montoTotal" placeholder="Monto Total" readonly>
    </div>

    <div class="d-flex justify-content-end">
        <button type="button" class="btn btn-danger me-2" (click)="cerrarModal(false)">
            CANCELAR
        </button>
        <button type="button" class="btn btn-primary" (click)="guardar()" [disabled]="estCantidad()">
            GUARDAR
        </button>
    </div>
</form>
