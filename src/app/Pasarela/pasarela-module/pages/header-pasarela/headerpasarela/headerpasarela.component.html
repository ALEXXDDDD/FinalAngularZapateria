<!-- Título -->
<h1>Tu dirección</h1>

<!-- Mostrar direcciones usando *ngFor -->
<div *ngFor="let p of vistPerfil" class="mb-4">
  <div class="profile-image-container position-relative">
    
  </div>
  <div class="profile-details text-center mt-3">
    <p class="card-text"><strong>Direccion:</strong> {{p.direccion}}</p>
  </div>
</div>

<!-- Botón para abrir el modal -->
<button class="btn btn-primary" (click)="realizarEnvio(modalEdit)">Cambiar Dirección</button>

<!-- Modal Template -->
<ng-template #modalEdit>
  <app-envio-domicilio
      [title]="titleModal"
      [accion]="accionModal"
      (closeModalEmmit)="getCloseModalEmmit($event)">
  </app-envio-domicilio>
</ng-template>
