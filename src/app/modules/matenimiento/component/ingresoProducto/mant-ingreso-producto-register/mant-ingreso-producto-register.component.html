<!-- Modal -->
<div class="fixed inset-0 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg max-w-lg w-full">
    <!-- Encabezado del Modal -->
    <div class="p-4 border-b">
      <h2 class="text-lg font-semibold text-gray-800">{{ title }}</h2>
    </div>

    <!-- Contenido del Modal -->
    <div class="p-6">
      <form [formGroup]="myForm" (ngSubmit)="guardar()">
        <!-- Campo de selección para la fecha -->
        <div class="mb-4">
          <label for="fechaIngreso" class="block text-sm font-medium text-gray-700">Fecha de Ingreso</label>
          <input
            type="date"
            id="fechaIngreso"
            formControlName="fechaIngreso"
            class="mt-1 block w-full py-2 px-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
          />
        </div>

        <!-- Campo de selección para el código de orden -->
        <div class="mb-4">
          <label for="codigoOrden" class="block text-sm font-medium text-gray-700">Código de Orden</label>
          <select
            id="codigoOrden"
            formControlName="codigoProduccion"
            class="mt-1 block w-full py-2 px-3 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
          >
            <option value="">Seleccione un código de orden</option>
            <option *ngFor="let e of responseVProduccion" [value]="e.codigoProduccion">
              {{ e.codigoProduccion }}
            </option>
          </select>
        </div>
          <!-- Campo de selección para el Nombre Producto -->
          <div class="mb-4">
            <label for="nombreProd" class="block text-sm font-medium text-gray-700">Seleccione el Producto</label>
            <select
              id="nombreProd"
              formControlName="nombreProd"
              class="mt-1 block w-full py-2 px-3 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            >
              <option value="">Seleccione el Producto del Orden</option>
              <option *ngFor="let e of responseProducto" [value]="e.nombreProd">
                {{ e.nombreProd }}
              </option>
            </select>
          </div>

        <!-- Campo de entrada para la cantidad -->
        <div class="mb-4">
          <label for="cantidad" class="block text-sm font-medium text-gray-700">Cantidad</label>
          <input
            type="number"
            id="cantidad"
            formControlName="cantidad"
            class="mt-1 block w-full py-2 px-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
          />
        </div>

        <!-- Botones de acción -->
        <div class="flex justify-end space-x-2 mt-6">
          <button
            type="button"
            class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500"
            (click)="cerrarModal(true)"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
          >
            Guardar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
