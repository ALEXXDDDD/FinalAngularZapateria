<div class="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto">

    <div class="text-center mb-8">
      <h1 class="text-4xl font-extrabold tracking-tight text-slate-800 mb-4">
        Gestión de Clientes
      </h1>
      <div class="flex justify-center">
        <img src="./../../../../../../assets/img/img_Template/img_cliente.PNG" 
             alt="Imagen de Cliente" 
             class="w-40 h-40 object-cover rounded-full shadow-md border-4 border-white transition-transform hover:scale-105 duration-300">
      </div>
    </div>

    <div class="flex justify-end mb-6">
      <button (click)="crearCliente(modalEdit)" 
              class="inline-flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
        <i class="fa-regular fa-user text-lg"></i>
        <span>Nuevo Cliente</span>
      </button>
    </div>

    <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
      <div class="bg-slate-800 px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-bold text-white">Lista de Clientes Registrados</h2>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full min-w-full divide-y divide-gray-200">
          <thead class="bg-slate-50">
            <tr>
              <th scope="col" class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Nombre del Cliente</th>
              <th scope="col" class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Tipo Doc.</th>
              <th scope="col" class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Teléfono</th>
              <th scope="col" class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Dirección</th>
              <th scope="col" class="px-6 py-3.5 class text-center text-xs font-bold text-slate-500 uppercase tracking-wider">Acciones</th>
            </tr>
          </thead>
          
          <tbody class="bg-white divide-y divide-gray-200">
            <ng-container *ngFor="let e of responseVwCliente">
              <tr *ngFor="let d of e.clientes" class="hover:bg-blue-50/40 transition-colors duration-150">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">{{ d.nombreCliente }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">
                  <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                    {{ d.tipoDocumento }}
                  </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ d.telefono }}</td>
                <td class="px-6 py-4 text-sm text-slate-600 max-w-xs truncate" title="{{ d.direccion }}">{{ d.direccion }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium space-x-2">
                  <button class="inline-flex items-center space-x-1 bg-amber-500 hover:bg-amber-600 text-white text-xs px-3 py-1.5 rounded-md shadow-sm transition-colors duration-150">
                    <i class="fas fa-edit"></i>
                    <span>Editar</span>
                  </button>
                  <button class="inline-flex items-center space-x-1 bg-rose-600 hover:bg-rose-700 text-white text-xs px-3 py-1.5 rounded-md shadow-sm transition-colors duration-150">
                    <i class="fas fa-trash"></i>
                    <span>Eliminar</span>
                  </button>
                </td>
              </tr>
            </ng-container>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<ng-template #modalEdit>
  <app-mant-cliente-register
    [title]="titleModal"
    [responsListCliente]="usuarioSelect"
    [accion]="accionModal"
    (closeModalEmmit)="getCloseModalEmmit($event)">
  </app-mant-cliente-register>
</ng-template>

<ng-template #modalEditCredito>
  <app-mant-detalle-credito-register
    [title]="titleModal"
    [responsListCredito]="creditoSelect"
    [accion]="accionModal"
    (closeModalEmmit)="getCloseModalEmmit($event)">
  </app-mant-detalle-credito-register>
</ng-template>

<ng-template #modalEditDetalleCredito>
  <app-mant-detalle-credito-register
    [title]="titleModal"
    [accion]="accionModal"
    (closeModalEmmit)="getCloseModalEmmit($event)">
  </app-mant-detalle-credito-register>
</ng-template>
