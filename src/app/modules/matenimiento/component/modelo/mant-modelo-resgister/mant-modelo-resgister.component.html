<div class="modal-header bg-primary text-white py-2">
    <h5 class="modal-title">{{title}}</h5>
    <button type="button" class="btn-close" aria-label="Close"></button>
</div>

<div class="modal-body">
  <form [formGroup]="myForm" class="p-3">
    <!-- Número de Modelo -->
    <div class="form-group mb-3">
      <label for="idModelo" class="form-label">Número de Modelo</label>
      <input type="text" formControlName="idModelo" class="form-control form-control-sm" placeholder="Ingrese número de modelo">
    </div>

    <!-- Nombre de Modelo -->
    <div class="form-group mb-3">
      <label for="nombreModelo" class="form-label">Nombre del Modelo</label>
      <input type="text" formControlName="nombreModelo" class="form-control form-control-sm" placeholder="Ingrese nombre del modelo">
      <div *ngIf="myForm.get('nombreModelo')?.errors && myForm.get('nombreModelo')?.touched">
        <small class="text-danger" *ngIf="myForm.get('nombreModelo')?.hasError('required')">Campo Requerido</small>
      </div>
    </div>

    <!-- Código del Modelo -->
    <div class="form-group mb-3">
      <label for="codigoModelo" class="form-label">Código del Modelo</label>
      <input type="text" formControlName="codigoModelo" class="form-control form-control-sm" placeholder="Ingrese código del modelo">
      <div *ngIf="myForm.get('codigoModelo')?.errors && myForm.get('codigoModelo')?.touched">
        <small class="text-danger" *ngIf="myForm.get('codigoModelo')?.hasError('required')">Campo Requerido</small>
      </div>
    </div>

    <!-- Descripción del Modelo -->
    <div class="form-group mb-3">
      <label for="descripModelo" class="form-label">Descripción Breve</label>
      <textarea formControlName="descripModelo" class="form-control form-control-sm" rows="2"  [value]="modelo.descripModelo" placeholder="Descripción"></textarea>
      <div *ngIf="myForm.get('descripcionModelo')?.errors && myForm.get('descripModelo')?.touched">
        <small class="text-danger" *ngIf="myForm.get('descripModelo')?.hasError('required')">Campo Requerido</small>
      </div>
    </div>

    <!-- Botones de acción -->
    <div class="d-flex justify-content-end mt-2">
      <button type="button" class="btn btn-secondary btn-sm me-2" (click)="cerrarModal(true)">Cancelar</button>
      <button class="btn btn-primary btn-sm" (click)="guardar()">Guardar</button>
    </div>
  </form>
</div>
