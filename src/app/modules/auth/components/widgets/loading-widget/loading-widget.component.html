<div class="widget-state" [ngSwitch]="state">
  <div *ngSwitchCase="loadStateEnum.Loading" class="state-card loading">
    <div class="loader">
      <svg viewBox="0 0 80 80">
        <circle r="32" cy="40" cx="40" id="test"></circle>
      </svg>
    </div>
    <p>{{ loadingMessage }}</p>
  </div>

  <div *ngSwitchCase="loadStateEnum.Success" class="state-card success">
    <span class="icon">✓</span>
    <p>{{ successMessage }}</p>
  </div>

  <div *ngSwitchCase="loadStateEnum.Error" class="state-card error">
    <span class="icon">✕</span>
    <p>{{ errorMessage }}</p>
  </div>
</div>
